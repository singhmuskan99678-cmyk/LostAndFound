<!DOCTYPE html>
<html>
<head>
    <title>Lost & Found System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 3.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.3em; opacity: 0.9; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.95); padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .stat-number { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 1.1em; margin-top: 5px; }
        .actions { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 15px 30px; font-size: 1.2em; border: none; border-radius: 50px; cursor: pointer; text-decoration: none; transition: all 0.3s; font-weight: 600; }
        .btn-primary { background: #ff6b6b; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.9); color: #333; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .api-docs { text-align: center; margin-top: 40px; color: white; }
        @media (max-width: 768px) { .header h1 { font-size: 2.5em; } .actions { flex-direction: column; align-items: center; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Lost & Found</h1>
            <p>Your items are safe with us!</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-items">0</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="claimed-items">0</div>
                <div class="stat-label">Claimed Items</div>
            </div>
        </div>
        
        <div class="actions">
            <a href="/report-lost" class="btn btn-primary">📱 Report Lost Item</a>
            <a href="/found-items" class="btn btn-secondary">🔍 View Found Items</a>
            <a href="/docs" class="btn btn-secondary">⚙️ API Docs</a>
        </div>
        
        <div class="api-docs">
            <p>👨‍💻 Developer? Use <a href="/docs" style="color: #ffeb3b;">Swagger UI</a></p>
        </div>
    </div>

    <script>
        // Live stats update
        fetch('/items/')
            .then(r => r.json())
            .then(items => {
                document.getElementById('total-items').textContent = items.length;
                document.getElementById('claimed-items').textContent = items.filter(i => i.claimed).length;
            });
    </script>
</body>
</html>
