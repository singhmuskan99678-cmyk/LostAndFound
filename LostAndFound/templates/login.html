{% extends "base.html" %}

{% block title %}Login - Campus Lost & Found{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <div class="item-card" style="max-width: 450px; padding: 3rem; text-align: center;">
            <div style="margin-bottom: 2rem;">
                <i class="fas fa-sign-in-alt" style="font-size: 4rem; color: #667eea;"></i>
                <h1 style="font-size: 2.5rem; margin: 1rem 0;">Welcome Back</h1>
                <p style="color: var(--text-light);">Sign in to your account</p>
            </div>

            <form method="POST" action="/login" style="text-align: left;">
                <div class="form-group">
                    <label><i class="fas fa-user" style="color: #10b981; margin-right: 0.5rem;"></i> Username or Email</label>
                    <input type="text" name="username" placeholder="Enter username or email" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock" style="color: #ef4444; margin-right: 0.5rem;"></i> Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn" style="width: 100%; padding: 1.25rem; font-size: 1.1rem;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb;">
                <p style="color: var(--text-light); margin: 0;">
                    Don't have an account? 
                    <a href="/signup" style="color: #667eea; font-weight: 600; text-decoration: none;">Sign up here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
